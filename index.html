<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  
  <!-- SEO - Balises principales -->
  <title>AEJ • Téléchargez votre fiche d'inscription en ligne</title>
  <meta name="description" content="Espace stagiaire AEJ : téléchargez votre fiche d'inscription officielle en quelques secondes. Accès sécurisé avec votre matricule.">
  <meta name="keywords" content="AEJ, fiche AEJ, téléchargement fiche, stagiaire AEJ, Agence Emploi Jeunes, Côte d'Ivoire, attestation stage">
  <meta name="author" content="Agence Emploi Jeunes">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ivan-26work.github.io/ma-fiche-aej/">
  <meta property="og:title" content="AEJ - Téléchargez votre fiche d'inscription">
  <meta property="og:description" content="Espace stagiaire officiel de l'Agence Emploi Jeunes. Téléchargez votre fiche AEJ en ligne.">
  <meta property="og:image" content="https://ivan-26work.github.io/ma-fiche-aej/assets/logo.png">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Style CSS -->
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <!-- LOADER INITIAL -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="loading-title">ESPACE STAGIAIRE</div>
    </div>
  </div>

  <!-- CASES MATRICULE -->
  <div class="cases-container">
    <div class="matricule-cases">
      <input type="text" class="case" id="case1" maxlength="1" placeholder="1" inputmode="numeric" disabled>
      <input type="text" class="case" id="case2" maxlength="1" placeholder="9" inputmode="numeric" disabled>
      <input type="text" class="case" id="case3" maxlength="1" placeholder="1" inputmode="numeric" disabled>
      <input type="text" class="case" id="case4" maxlength="1" placeholder="6" inputmode="numeric" disabled>
      <input type="text" class="case" id="case5" maxlength="1" placeholder="7" inputmode="numeric" disabled>
      <input type="text" class="case" id="case6" maxlength="1" placeholder="1" inputmode="numeric" disabled>
      <input type="text" class="case" id="case7" maxlength="1" placeholder="2" inputmode="numeric" disabled>
      <input type="text" class="case" id="case8" maxlength="1" placeholder="2" inputmode="numeric" disabled>
      <input type="text" class="case letter" id="case9" maxlength="1" placeholder="F" disabled>
    </div>
  </div>

  <!-- BARRE D'INFORMATION -->
  <div class="info-bar" id="infoBar">
    <div class="info-message" id="infoMessage">
      <i class="fas fa-id-card"></i>
      <span>Bienvenue sur l'espace stagiaire AEJ</span>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <main class="main-content">
    <div class="file-card" id="fileCard">
      <div class="mini-loader hidden" id="miniLoader">
        <div class="mini-spinner"></div>
        <p>Recherche</p>
      </div>

      <div class="file-name hidden" id="fileName">
        <i class="fas fa-file-pdf"></i>
        <span id="fileNameText"></span>
        <span class="file-hint">(cliquer pour ouvrir)</span>
      </div>
      
      <div class="file-display" id="fileDisplay">
        <div class="file-placeholder" id="filePlaceholder">
          <i class="fas fa-file-pdf"></i>
          <p>Votre fiche AEJ apparaîtra ici</p>
          <p class="placeholder-hint">Saisissez votre matricule ci-dessus</p>
        </div>
        <div class="file-preview hidden" id="filePreview"></div>
      </div>
      
      <div class="file-actions hidden" id="fileActions">
        <button class="action-btn" id="downloadBtn" title="Télécharger">
          <i class="fas fa-download"></i>
        </button>
        <button class="action-btn" id="shareBtn" title="Partager">
          <i class="fas fa-share-alt"></i>
        </button>
        <button class="action-btn cancel" id="cancelBtn" title="Annuler">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  </main>

  <!-- FOOTER SCROLLABLE -->
  <footer class="main-footer">
    <div class="footer-scroll">
      <div class="footer-pills">
        <a href="https://wa.me/2250141897143" target="_blank" class="pill" rel="noopener noreferrer">
          <i class="fab fa-whatsapp"></i>
          <span>WhatsApp</span>
          <small class="pill-phone">+225 0141897143</small>
        </a>
        <a href="tel:+2250141897143" class="pill">
          <i class="fas fa-phone-alt"></i>
          <span>Appel</span>
          <small class="pill-phone">+225 0141897143</small>
        </a>
        <a href="https://agenceemploijeunes.ci/site/" target="_blank" class="pill" rel="noopener noreferrer">
          <i class="fas fa-building"></i>
          <span>Site AEJ</span>
        </a>
        <a href="info.html" class="pill">
          <i class="fas fa-info-circle"></i>
          <span>Infos</span>
        </a>
        <a href="profil.html" class="pill">
          <i class="fas fa-user"></i>
          <span>Profil</span>
        </a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/theme.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
