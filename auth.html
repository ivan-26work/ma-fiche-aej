<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

  <!-- SEO - Meta description -->

  <meta name="author" content="Agence Emploi Jeunes">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph / Facebook -->

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AEJ - Connexion Stagiaire">
  <meta name="twitter:description" content="Connectez-vous à votre espace stagiaire AEJ.">
  <meta name="twitter:image" content="https://ivan-26work.github.io/ma-fiche-aej/assets/logo.png">
  
  <!-- Structured Data / Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Connexion Stagiaire AEJ",
    "description": "Page d'authentification pour les stagiaires de l'Agence Emploi Jeunes",
    "url": "https://ivan-26work.github.io/ma-fiche-aej/auth.html",
    "publisher": {
      "@type": "Organization",
      "name": "Agence Emploi Jeunes",
      "logo": "https://ivan-26work.github.io/ma-fiche-aej/assets/logo.png"
    }
  }
  </script>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="canonical" href="https://ivan-26work.github.io/ma-fiche-aej/auth.html">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Style CSS -->
  <link rel="stylesheet" href="css/auth.css">
  
  <style>
    /* Footer navigation pour auth.html */
    .footer-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 0 1rem;
      z-index: 90;
    }

    .footer-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.7rem;
      transition: all 0.2s;
      padding: 0.5rem 1rem;
      border-radius: 30px;
    }

    .footer-link i {
      font-size: 1.2rem;
    }

    .footer-link:hover {
      color: var(--primary-pink);
      background: rgba(255, 255, 255, 0.3);
    }

    /* Ajustement du padding body pour laisser place au footer */
    body {
      padding-bottom: 80px;
    }

    @media (min-width: 768px) {
      .footer-nav {
        max-width: 400px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        border-radius: 40px 40px 0 0;
        background: rgba(255, 255, 255, 0.3);
      }
    }

    /* Mode nuit */
    body.night-mode .footer-nav {
      background: rgba(35, 40, 47, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <h1 class="visually-hidden">Authentification Espace Stagiaire AEJ</h1>
  
  <!-- HEADER FIXE -->
  <header class="header">
    <a href="index.html" class="logo-circle" aria-label="Retour à l'accueil">
      <img src="assets/logo.png" alt="Logo AEJ" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'url(%23g)\'/%3E%3Cdefs%3E%3ClinearGradient id=\'g\' x1=\'0%25\' y1=\'0%25\' x2=\'100%25\' y2=\'100%25\'%3E%3Cstop offset=\'0%25\' stop-color=\'%234a90e2\'/%3E%3Cstop offset=\'100%25\' stop-color=\'%23ff7e9f\'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x=\'50\' y=\'70\' font-size=\'40\' text-anchor=\'middle\' fill=\'white\' font-family=\'Arial\'%3ES%3C/text%3E%3C/svg%3E';">
    </a>
    <span class="site-name-3d">ESPACE STAGIAIRE</span>
  </header>

  <!-- CONTENU PRINCIPAL -->
  <main class="main-content">
    <!-- CARTE AUTH -->
    <div class="auth-card">
      <!-- ONGLETS -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin">Connexion</button>
        <button class="tab-btn" id="tabSignup">Inscription</button>
      </div>

      <!-- FORMULAIRE CONNEXION -->
      <form class="auth-form" id="formLogin" novalidate>
        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Adresse email" id="loginEmail" required>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mot de passe" id="loginPassword" required>
          </div>
          <button type="button" class="toggle-password" id="toggleLoginPassword" tabindex="-1" aria-label="Afficher le mot de passe">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" checked> Se souvenir de moi
          </label>
          <a href="#" class="forgot-link" id="forgotPassword">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-submit" id="btnLogin">Se connecter</button>
      </form>

      <!-- FORMULAIRE INSCRIPTION -->
      <form class="auth-form hidden" id="formSignup" novalidate>
        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Adresse email" id="signupEmail" required>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mot de passe" id="signupPassword" required>
          </div>
          <button type="button" class="toggle-password" id="toggleSignupPassword" tabindex="-1" aria-label="Afficher le mot de passe">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Confirmer le mot de passe" id="signupConfirm" required>
          </div>
          <button type="button" class="toggle-password" id="toggleSignupConfirm" tabindex="-1" aria-label="Afficher le mot de passe">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="acceptTerms" required> J'accepte les <a href="confidentialite.html" target="_blank">conditions d'utilisation</a>
          </label>
        </div>

        <button type="submit" class="btn-submit" id="btnSignup">Créer mon compte</button>
      </form>

      <!-- MODALE RÉINITIALISATION -->
      <div class="modal hidden" id="forgotModal">
        <div class="modal-content">
          <h3>Réinitialisation</h3>
          <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
          <div class="form-group">
            <div class="input-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" placeholder="Votre email" id="resetEmail">
            </div>
          </div>
          
          <div class="modal-buttons">
            <button class="btn-modal btn-cancel" id="cancelReset">Annuler</button>
            <button class="btn-modal btn-send" id="sendReset">Envoyer</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER NAVIGATION - Contact, À propos, FAQ -->
  <footer class="footer-nav">
    <a href="contact.html" class="footer-link">
      <i class="fas fa-phone-alt"></i>
      <span>Contact</span>
    </a>
    <a href="apropos.html" class="footer-link">
      <i class="fas fa-info-circle"></i>
      <span>À propos</span>
    </a>
    <a href="faq.html" class="footer-link">
      <i class="fas fa-question-circle"></i>
      <span>FAQ</span>
    </a>
  </footer>

  <!-- Script JavaScript -->
  <script src="js/auth.js"></script>
  <script>
    // Thème
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'night') {
      document.body.classList.add('night-mode');
    }
  </script>
</body>
</html>
