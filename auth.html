
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AEJ • Stagiaire • Authentification</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="logo-circle" aria-label="AEJ">
      <img src="assets/logo.png" alt="Logo AEJ" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'url(%23g)\'/%3E%3Cdefs%3E%3ClinearGradient id=\'g\' x1=\'0%25\' y1=\'0%25\' x2=\'100%25\' y2=\'100%25\'%3E%3Cstop offset=\'0%25\' stop-color=\'%234a90e2\'/%3E%3Cstop offset=\'100%25\' stop-color=\'%23ff7e9f\'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x=\'50\' y=\'70\' font-size=\'50\' text-anchor=\'middle\' fill=\'white\' font-family=\'Arial\'%3EAEJ%3C/text%3E%3C/svg%3E';">
    </a>
    <span class="site-name">AEJ</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Thème">
      <i class="fas fa-moon"></i>
    </button>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- CARTE AUTH NÉOMORPHIQUE -->
    <div class="auth-card">
      <!-- ONGLETS -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin">Connexion</button>
        <button class="tab-btn" id="tabSignup">Inscription</button>
      </div>

      <!-- FORMULAIRE CONNEXION -->
      <form class="auth-form" id="formLogin" novalidate>
        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" id="loginEmail" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mot de passe" id="loginPassword" required autocomplete="current-password">
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"> Se souvenir de moi
          </label>
          <a href="#" class="forgot-link" id="forgotPassword">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-submit" id="btnLogin">Se connecter</button>
      </form>

      <!-- FORMULAIRE INSCRIPTION -->
      <form class="auth-form hidden" id="formSignup" novalidate>
        <div class="form-row">
          <div class="form-group half">
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Prénom" id="signupFirstname" required autocomplete="given-name">
            </div>
          </div>
          <div class="form-group half">
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Nom" id="signupLastname" required autocomplete="family-name">
            </div>
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" id="signupEmail" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mot de passe" id="signupPassword" required autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Confirmer mot de passe" id="signupConfirm" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="acceptTerms" required> J'accepte les conditions d'utilisation
          </label>
        </div>

        <button type="submit" class="btn-submit" id="btnSignup">Créer mon compte</button>
      </form>

      <!-- MODALE RÉINITIALISATION -->
      <div class="modal hidden" id="forgotModal">
        <div class="modal-content">
          <h3>Réinitialisation</h3>
          <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
          <div class="form-group">
            <div class="input-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" placeholder="Votre email" id="resetEmail">
            </div>
          </div>
          <div class="modal-buttons">
            <button class="btn-modal btn-cancel" id="cancelReset">Annuler</button>
            <button class="btn-modal btn-send" id="sendReset">Envoyer</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer-nav">
    <a href="contact.html" class="footer-link">
      <i class="fas fa-phone-alt"></i>
      <span>Contact</span>
    </a>
    <a href="confidentialite.html" class="footer-link">
      <i class="fas fa-lock"></i>
      <span>Confidentialité</span>
    </a>
    <a href="apropos.html" class="footer-link">
      <i class="fas fa-info-circle"></i>
      <span>À propos</span>
    </a>
  </footer>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
</body>
</html>
